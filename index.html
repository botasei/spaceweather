<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Space Weather Forecast</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{
  margin:0;
  font-family:Arial, sans-serif;
  background:#000;
  color:#fff;
}

.container{
  max-width:1000px;
  margin:auto;
  padding:20px;
}

.card{
  background:rgba(20,20,20,0.85);
  border-radius:10px;
  padding:20px;
  margin-bottom:20px;
}

h1, h2{
  text-align:center;
}

canvas{
  width:100%;
  height:300px;
}
</style>
</head>

<body>

<div class="container">

<h1>Прогноз геомагнитной активности</h1>

<div class="card">
  <canvas id="kpChart"></canvas>
  <p>Последнее обновление: <span id="last-update">—</span></p>
</div>

<div class="card">
  <h2>Состояние околоземного пространства</h2>
  <p id="status-text">—</p>
</div>

</div>

<script>

/* ================= ВСПОМОГАТЕЛЬНЫЕ ================= */

function pad2(n){ return n < 10 ? "0"+n : ""+n; }

function formatNowUtc(){
  const d = new Date();
  return pad2(d.getUTCDate())+"."+
         pad2(d.getUTCMonth()+1)+"."+
         d.getFullYear()+" "+
         pad2(d.getUTCHours())+":"+
         pad2(d.getUTCMinutes())+" UT";
}

function generateForecastDates(){
  const today = new Date();
  const dates = [];
  for(let i=0;i<6;i++){
    const d = new Date(today);
    d.setDate(d.getDate()+i);
    dates.push(
      pad2(d.getDate())+"."+
      pad2(d.getMonth()+1)+"."+
      d.getFullYear()
    );
  }
  return dates;
}

function kpColor(kp){
  if(kp <= 3) return "#00b050";
  if(kp === 4) return "#ffd800";
  if(kp === 5) return "#ff3b3b";
  if(kp === 6) return "#e00000";
  if(kp === 7) return "#b00000";
  return "#800000";
}

/* ================= DEFAULT ================= */

const defaultData = {
  dates: generateForecastDates(),
  kp: [1,2,3,2,1,2],
  lastUpdate: formatNowUtc(),
  statusText: "Нет данных"
};

/* ================= ГРАФИК ================= */

let chart;

function renderKpChart(data){
  const ctx = document.getElementById("kpChart");

  if(chart) chart.destroy();

  chart = new Chart(ctx,{
    type:"bar",
    data:{
      labels:data.dates,
      datasets:[{
        data:data.kp,
        backgroundColor:data.kp.map(kpColor)
      }]
    },
    options:{
      plugins:{ legend:{ display:false }},
      scales:{
        y:{ beginAtZero:true, max:9 }
      }
    }
  });

  document.getElementById("last-update").textContent =
    data.lastUpdate || formatNowUtc();

  document.getElementById("status-text").textContent =
    data.statusText || "Нет данных";
}

/* ================= API ================= */

async function fetchForecast(){
  try{
    const r = await fetch("/api/forecast");
    const j = await r.json();

    console.log("API:", j);

    return j.data; // ✅ ВАЖНО
  }catch(e){
    console.error(e);
    return null;
  }
}

/* ================= INIT ================= */

(async () => {

  const serverData = await fetchForecast();

  const data = serverData || defaultData;

  renderKpChart(data);

})();

</script>

</body>
</html>
